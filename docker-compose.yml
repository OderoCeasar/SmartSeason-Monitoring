version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: smartseason-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartseason
      POSTGRES_USER: smartseason
      POSTGRES_PASSWORD: smartseason
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartseason -d smartseason"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: smartseason-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://smartseason:smartseason@db:5432/smartseason
      JWT_SECRET: change_me_in_production
      NODE_ENV: development
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: smartseason-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "5173:5173"

volumes:
  postgres_data:
